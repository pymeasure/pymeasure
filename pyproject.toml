[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm>=6.2"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
# write_to = "pymeasure/_version.py"

[tool.black]
line-length = 100

[tool.isort]
profile = "black"

[tool.poetry]
name = 'pymeasure'
authors = ['authors.txt']
description = ''
version = '0.1.0'

[tool.poetry.dependencies]
python = '>=3.9'
pyvisa = "^1.14.1"
pyvisa-py = "^0.7.1"
numpy = "^1.26.2"
pyserial = "^3.5"
pandas = "^2.1.4"

[tool.poetry.group.test.dependencies]
pytest = "^7.4.3"

