name: PyMeasure CI
on:
  push:
    branches:
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  lint_typecheck:
    name: Lint and Type Check
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install pymeasure
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .[tests,gui,tcp,dev]
          pip install PyQt6
      - name: Add venv to PATH for pyright
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Lint with ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format github"
      - name: Set up flake8 annotations
        uses: rbialon/flake8-annotations@v1
      - name: Lint with flake8
        run: |
          pip install flake8
          # check whitespace/blank-line rules (E2, E3) ruff does not detect yet
          flake8 . --count --show-source --statistics
      - name: Type check with pyright
        if: success() || failure()
        uses: jakebailey/pyright-action@v3
        with:
          version: PATH
          annotate: all
        continue-on-error: true

  docs:
    name: Docs
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pymeasure requirements
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: .github/pymeasure.yml
          cache-environment-key: pylatest-ubuntu-latest-mamba-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}
          cache-downloads: false
      - name: Python and Mamba version
        run: |
          python --version
          micromamba info
      - uses: ammaraskar/sphinx-problem-matcher@master
      - name: Generate docs
        working-directory: ./docs
        run: |
          echo "::add-matcher::.github/sphinx.json"
          make html SPHINXOPTS="-W --keep-going"
      - name: Run doctests
        if: always()
        working-directory: ./docs
        run: |
          echo "::add-matcher::.github/sphinx.json"
          make doctest SPHINXOPTS="-W --keep-going"

  test_coverage:
    name: Code Coverage on codecov
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install pymeasure requirements
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: .github/pymeasure.yml
          create-args: python=${{ matrix.python-version }}
          cache-environment-key: py${{ matrix.python-version }}-${{ matrix.os }}-mamba-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}
          cache-downloads: false
      - name: Python version
        run: python --version
      - name: Install Pymeasure
        run: pip install -e .[gui,tests]  # editable for covtest
      - name: Pymeasure version
        run: python -c "import pymeasure;print(pymeasure.__version__)"
      - name: Test for Coverage
        # xvfb for graphical interface
        run: |
          echo "::add-matcher::.github/pytest.json"
          xvfb-run -a pytest --cov=pymeasure --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: ./coverage.xml,!./cache
          flags: unittests
          name: codecov-umbrella
          verbose: true

  test:
    name: Python ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: true
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install pymeasure requirements
        uses: mamba-org/setup-micromamba@v3
        with:
          micromamba-version: '2.6.0-0'
          environment-file: '.github/pymeasure.yml'
          create-args: python=${{ matrix.python-version }}
          cache-environment-key: py${{ matrix.python-version }}-${{ matrix.os }}-mamba-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}
          cache-downloads: false
      - name: Python version
        run: python --version
      - name: Install Pymeasure
        # If the pytest problem matcher stops working because of bad paths, do an editable install
        run: pip install .[gui,tests]
      - name: Pymeasure version
        run: python -c "import pymeasure;print(pymeasure.__version__)"
      - name: Run pytest with xvfb
        if: runner.os == 'Linux'
        run: |
          echo "::add-matcher::.github/pytest.json"
          xvfb-run -a pytest
      - name: Run pytest
        if: runner.os != 'Linux'
        run: |
          echo "::add-matcher::.github/pytest.json"
          pytest

  test_pandas3:
    name: pandas3, Python ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install base pymeasure requirements
        uses: mamba-org/setup-micromamba@v3
        with:
          # Pegged: micromamba 2.6.1-0 has a broken Windows build (missing zlib.dll).
          # See mamba-org/setup-micromamba#306 and micromamba-releases#97.
          micromamba-version: '2.6.0-0'
          environment-file: '.github/pymeasure.yml'
          create-args: python=${{ matrix.python-version }}
          cache-environment-key: py${{ matrix.python-version }}-${{ matrix.os }}-mamba-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}
          cache-downloads: false
      - name: Python version
        run: python --version
      - name: Upgrade pandas to latest via pip
        run: pip install "pandas>=3.0"
      - name: Install Pymeasure
        run: pip install .[gui,tests]
      - name: Pymeasure version
        run: python -c "import pymeasure;print(pymeasure.__version__)"
      - name: pandas and numpy versions
        run: python -c "import pandas; import numpy; print('pandas', pandas.__version__, 'numpy', numpy.__version__)"
      - name: Run pytest with xvfb
        if: runner.os == 'Linux'
        run: |
          echo "::add-matcher::.github/pytest.json"
          xvfb-run -a pytest
      - name: Run pytest
        if: runner.os != 'Linux'
        run: |
          echo "::add-matcher::.github/pytest.json"
          pytest
