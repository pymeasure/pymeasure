name: pymeasure_pandas3_numpy2
channels:
  - conda-forge
dependencies:
  - cloudpickle=1.6.0
  - numpy >=2.0
  - pandas >=3.0
  - pint=0.24.4
  - pyqt=5.15.11
  - pyqtgraph=0.12.4
  - pyserial=3.4
  - pyvisa=1.14.1
  - pyzmq=26.2.0
  - qtpy=2.4.3
# Development dependencies below
  - pytest-qt=4.2.0
  - pytest-runner=5.2
  - pytest=7.2.0
  - pytest-cov=4.1.0
  - pyvisa-sim==0.6.0
  - flake8=7.3.0
  - setuptools_scm # don't pin, to get newest features
